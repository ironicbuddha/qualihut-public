name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - content/**
      - quartz-4/**
      - .github/workflows/deploy-quartz-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: quartz-4/.node-version
          cache: npm
          cache-dependency-path: quartz-4/package-lock.json

      - name: Install dependencies
        working-directory: quartz-4
        run: npm ci

      - name: Build Quartz
        working-directory: quartz-4
        run: npm run repo:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-4/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
